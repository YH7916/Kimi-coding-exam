<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>On-Call Copilot</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <button
        id="history-button"
        class="history-button"
        type="button"
        aria-label="Toggle history sidebar"
        aria-expanded="false"
        aria-controls="history-sidebar"
      >
        <img src="/static/assets/panel-left.svg" alt="" aria-hidden="true">
      </button>
      <a class="home-button" href="/v3" aria-label="Home">
        <img src="/static/assets/house.svg" alt="" aria-hidden="true">
      </a>
    </div>
    <nav class="version-switcher" aria-label="Version switcher">
      <a data-mode="v1" href="/v1">v1 Search</a>
      <a data-mode="v2" href="/v2">v2 RAG</a>
      <a data-mode="v3" href="/v3">v3 Agent</a>
    </nav>
    <div class="topbar-tools">
      <a
        class="github-button"
        href="https://github.com/YH7916/Kimi-coding-exam/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open GitHub repository"
      >
        <img src="/static/assets/github-mark.svg" alt="" aria-hidden="true">
      </a>
      <button
        id="settings-button"
        class="settings-button"
        type="button"
        aria-label="Runtime status and settings"
        aria-expanded="false"
        aria-controls="settings-sidebar"
      >
        <img src="/static/assets/settings-2.svg" alt="" aria-hidden="true">
      </button>
    </div>
  </header>
  <main>
    <section id="app" aria-live="polite"></section>
  </main>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
